var idx = 0, timer = null, running = false;

var d = isIOS ? [{axis:1,sign:1},{axis:2,sign:-1},{axis:0,sign:1}] : [{axis:1,sign:-1},{axis:2,sign:-1},{axis:0,sign:-1}];
var c = [{axis:d[0].axis,sign:d[0].sign},{axis:d[1].axis,sign:d[1].sign},{axis:d[2].axis,sign:d[2].sign}];

function syncUI(){
  for(var i=0;i<3;i++){
    var ie=document.getElementById('dbgIn'+i);if(ie)ie.value=c[i].axis;
    var se=document.getElementById('dbgSign'+i);if(se)se.value=c[i].sign;
  }
}

function sendRemap(){
  if(window.NSBridge&&typeof NSBridge.setMotionRemap==='function'){
    NSBridge.setMotionRemap(c[0].axis,c[0].sign,c[1].axis,c[1].sign,c[2].axis,c[2].sign);
  }else if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.nsBridge){
    window.webkit.messageHandlers.nsBridge.postMessage({type:'setMotionRemap',remap:[{axis:c[0].axis,sign:c[0].sign},{axis:c[1].axis,sign:c[1].sign},{axis:c[2].axis,sign:c[2].sign}]});
  }
}

function applyCombo(n){
  idx=n%combos.length;
  var co=combos[idx];
  for(var i=0;i<3;i++){c[i].axis=co.inp[i];c[i].sign=co.sg[i];}
  syncUI();sendRemap();
  document.getElementById('dbgIdx').textContent=(idx+1)+'/'+combos.length;
}

function cycleStep(){
  if(!running)return;
  applyCombo(idx+1);
}

document.getElementById('dbgCycle').onclick=function(){
  if(running)return;
  running=true;
  applyCombo(0);
  timer=setInterval(cycleStep,5000);
};
document.getElementById('dbgPause').onclick=function(){
  running=false;
  if(timer){clearInterval(timer);timer=null;}
};
document.getElementById('dbgResume').onclick=function(){
  if(running||timer)return;
  running=true;
  timer=setInterval(cycleStep,5000);
};

var btn=document.getElementById('dbgBtn'),panel=document.getElementById('dbgPanel');
btn.onclick=function(){panel.style.display=(panel.style.display==='none'?'block':'none');};
document.getElementById('dbgClose').onclick=function(){panel.style.display='none';};
document.getElementById('dbgReset').onclick=function(){
  if(running){running=false;if(timer){clearInterval(timer);timer=null;}}
  c=[{axis:d[0].axis,sign:d[0].sign},{axis:d[1].axis,sign:d[1].sign},{axis:d[2].axis,sign:d[2].sign}];
  syncUI();sendRemap();
  document.getElementById('dbgIdx').textContent='0/48';
};
for(var i=0;i<3;i++){(function(idx){
  var ie=document.getElementById('dbgIn'+idx);if(ie)ie.onchange=function(){if(!running){c[idx].axis=parseInt(this.value);sendRemap();}};
  var se=document.getElementById('dbgSign'+idx);if(se)se.onchange=function(){if(!running){c[idx].sign=parseInt(this.value);sendRemap();}};
})(i);}
syncUI();
})();
</script>
</body>
</html>

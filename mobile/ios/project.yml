name: NSControl
options:
  bundleIdPrefix: com.nscontrol
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: NSControl/Info.plist

targets:
  NSControl:
    type: application
    platform: iOS
    sources:
      - NSControl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nscontrol.app
        PRODUCT_NAME: NS-mobile
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: NSControl/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
    info:
      path: NSControl/Info.plist

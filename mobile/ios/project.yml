name: NSControl
options:
  bundleIdPrefix: com.nscontrol
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: NSControl/Info.plist

targets:
  NSControl:
    type: application
    platform: iOS
    sources:
      - path: NSControl
        excludes:
          - WebApp/**
      - path: NSControl/WebApp
        type: folder
        buildPhase: resources
      - ../shared/ns_protocol.c
      - ../shared/ns_protocol.h
      - ../shared/sdl_controller.c
      - ../shared/sdl_controller.h
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nscontrol.app
        PRODUCT_NAME: NS Mobile
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: NSControl/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: NSControl/ProtocolBridge.h
        HEADER_SEARCH_PATHS: "$(PROJECT_DIR)/../shared $(PROJECT_DIR)/SDL3/include"
        LIBRARY_SEARCH_PATHS: "$(PROJECT_DIR)/SDL3/lib"
        OTHER_LDFLAGS: "$(PROJECT_DIR)/SDL3/lib/libSDL3.a -framework AudioToolbox -framework AVFoundation -framework CoreAudio -framework CoreBluetooth -framework CoreGraphics -framework CoreHaptics -framework CoreMotion -framework CoreVideo -framework Foundation -framework GameController -framework Metal -framework OpenGLES -framework QuartzCore -framework UIKit"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
    info:
      path: NSControl/Info.plist
    preBuildScripts:
      - name: "Build/install SDL3 for iOS if missing"
        script: |
          set -euo pipefail

          SDL_INSTALL="${SRCROOT}/SDL3"
          SDL_HEADER="${SDL_INSTALL}/include/SDL3/SDL.h"
          SDL_LIB="${SDL_INSTALL}/lib/libSDL3.a"
          SDL_SOURCE="${SRCROOT}/../../SDL3"
          SDL_BUILD="${SDL_SOURCE}/build/ios"

          if [ -f "${SDL_HEADER}" ] && [ -f "${SDL_LIB}" ]; then
            echo "SDL3 already installed for iOS at ${SDL_INSTALL}"
            exit 0
          fi

          echo "SDL3 iOS install is incomplete."
          echo "Expected header: ${SDL_HEADER}"
          echo "Expected library: ${SDL_LIB}"

          if [ ! -d "${SDL_SOURCE}" ]; then
            echo "error: SDL3 source checkout not found at ${SDL_SOURCE}"
            echo "error: In CI, run the Checkout SDL3 step before xcodebuild, or place libsdl-org/SDL at repo-root/SDL3."
            exit 1
          fi

          rm -rf "${SDL_INSTALL}"
          cmake -S "${SDL_SOURCE}" -B "${SDL_BUILD}" \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${SDL_INSTALL}" \
            -DSDL_STATIC=ON \
            -DSDL_SHARED=OFF \
            -DSDL_TEST_LIBRARY=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_EXAMPLES=OFF \
            -DSDL_INSTALL=ON
          cmake --build "${SDL_BUILD}" --config Release -j"$(sysctl -n hw.logicalcpu)"
          cmake --install "${SDL_BUILD}" --config Release --prefix "${SDL_INSTALL}"

          # Some SDL CMake/install combinations install the static lib but skip
          # copying public headers. Keep the Xcode include path stable anyway.
          if [ ! -f "${SDL_HEADER}" ] && [ -d "${SDL_SOURCE}/include/SDL3" ]; then
            mkdir -p "${SDL_INSTALL}/include"
            rsync -a "${SDL_SOURCE}/include/SDL3" "${SDL_INSTALL}/include/"
          fi

          test -f "${SDL_HEADER}" || { echo "error: SDL3 header still missing: ${SDL_HEADER}"; exit 1; }
          test -f "${SDL_LIB}" || { echo "error: SDL3 library still missing: ${SDL_LIB}"; exit 1; }
        basedOnDependencyAnalysis: false

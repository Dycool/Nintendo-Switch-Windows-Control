name: Build Mobile Apps

on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/build-mobile.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.5'

      - name: Install Android native build tools
        run: |
          yes | sdkmanager "cmake;3.22.1" "ndk;26.3.11579264"

      - name: Build debug APK
        working-directory: mobile/android
        run: gradle :app:assembleDebug --no-daemon

      - name: Stage Android APK
        run: |
          mkdir -p _artifact
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk _artifact/NS-mobile.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v6
        with:
          name: ns-mobile-android-apk
          path: _artifact/NS-mobile.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: mobile/ios
        run: xcodegen generate

      - name: Build iOS app unsigned
        working-directory: mobile/ios
        run: |
          xcodebuild \
            -project NSControl.xcodeproj \
            -scheme NSControl \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            SYMROOT=build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            build

      - name: Package iOS IPA unsigned
        run: |
          set -euo pipefail
          mkdir -p _artifact Payload
          APP="$(find mobile/ios/build/Release-iphoneos -maxdepth 1 -type d -name '*.app' -print -quit)"

          if [ -z "$APP" ]; then
            echo "Could not find built .app"
            find mobile/ios/build -maxdepth 4 -print | sort
            exit 1
          fi

          rm -rf Payload/NS-mobile.app
          ditto "$APP" Payload/NS-mobile.app

          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName NS-mobile" Payload/NS-mobile.app/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName NS-mobile" Payload/NS-mobile.app/Info.plist 2>/dev/null || true

          ditto -c -k --sequesterRsrc --keepParent Payload _artifact/NS-mobile.ipa

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v6
        with:
          name: ns-mobile-ios-ipa
          path: _artifact/NS-mobile.ipa
          if-no-files-found: error
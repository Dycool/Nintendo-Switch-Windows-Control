name: Build Mobile App

on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/build-mobile.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  actions: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        working-directory: mobile/android
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Stage Android APK
        run: |
          mkdir -p _artifact
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk _artifact/NS-mobile.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: ns-mobile-android-apk
          path: _artifact/NS-mobile.apk
          if-no-files-found: error


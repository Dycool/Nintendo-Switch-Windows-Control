name: Build Mobile App

on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/build-mobile.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  actions: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        working-directory: mobile/android
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Stage Android APK
        run: |
          mkdir -p _artifact
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk _artifact/NS-mobile.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: ns-mobile-android-apk
          path: _artifact/NS-mobile.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned iOS app
        run: |
          set -euo pipefail
          xcodebuild \
            -project mobile/ios/NSMobile.xcodeproj \
            -target NSMobile \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="$PWD/mobile/ios/build/Release-iphoneos" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Stage iOS IPA
        run: |
          set -euo pipefail
          mkdir -p _artifact/Payload
          APP="$(find mobile/ios/build/Release-iphoneos -maxdepth 1 -name 'NSMobile.app' -print -quit)"
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "NSMobile.app not found"
            find mobile/ios/build -maxdepth 5 -print || true
            exit 1
          fi
          cp -R "$APP" _artifact/Payload/NSMobile.app
          (cd _artifact && zip -r NS-mobile.ipa Payload)

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ns-mobile-ios-ipa
          path: _artifact/NS-mobile.ipa
          if-no-files-found: error

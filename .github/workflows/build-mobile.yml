name: Build Mobile Apps

"on":
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/build-mobile.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Install Android native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          yes | sdkmanager --licenses
          sdkmanager --install "cmake;3.22.1" "ndk;26.3.11579264"

      - name: Checkout SDL3
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL
          ref: release-3.4.10
          path: SDL3
          fetch-depth: 1

      - name: Build and install SDL3 for Android
        env:
          SDL3_INSTALL_ROOT: ${{ github.workspace }}/_cache/sdl3-android
        run: |
          set -euo pipefail
          ANDROID_NDK="${ANDROID_HOME}/ndk/26.3.11579264"
          for abi in arm64-v8a armeabi-v7a x86_64; do
            echo "::group::SDL3 ${abi}"
            cmake -S SDL3 -B "SDL3/build/android-${abi}" -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK}/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="${abi}" \
              -DANDROID_PLATFORM=26 \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="${SDL3_INSTALL_ROOT}/${abi}" \
              -DSDL_SHARED=OFF \
              -DSDL_STATIC=ON \
              -DSDL_TEST_LIBRARY=OFF \
              -DSDL_TESTS=OFF \
              -DSDL_EXAMPLES=OFF \
              -DSDL_INSTALL=ON
            cmake --build "SDL3/build/android-${abi}" --config Release --parallel 2
            cmake --install "SDL3/build/android-${abi}" --config Release
            test -d "${SDL3_INSTALL_ROOT}/${abi}/lib/cmake/SDL3"
            echo "::endgroup::"
          done

      - name: Build debug APK
        working-directory: mobile/android
        env:
          SDL3_ANDROID_ROOT: ${{ github.workspace }}/_cache/sdl3-android
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Stage Android APK
        run: |
          mkdir -p _artifact
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk _artifact/NS-mobile.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: ns-mobile-android-apk
          path: _artifact/NS-mobile.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Checkout SDL3
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL
          ref: release-3.4.10
          path: SDL3
          fetch-depth: 1

      - name: Build SDL3 for iOS
        run: |
          cmake -S SDL3 -B SDL3/build/ios \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_STATIC=ON \
            -DSDL_SHARED=OFF \
            -DSDL_TEST_LIBRARY=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_EXAMPLES=OFF
          cmake --build SDL3/build/ios --config Release -j"$(sysctl -n hw.logicalcpu)"

      - name: Copy SDL3 library to iOS project
        run: |
          SDL3_LIB=$(find SDL3/build/ios -name "libSDL3.a" -type f | head -1)
          if [ -z "$SDL3_LIB" ]; then
            echo "Could not find libSDL3.a in SDL3/build/ios"
            find SDL3/build/ios -name "*.a" -type f
            exit 1
          fi
          mkdir -p mobile/ios/SDL3/lib
          cp "$SDL3_LIB" mobile/ios/SDL3/lib/libSDL3.a

      - name: Generate Xcode project
        working-directory: mobile/ios
        run: xcodegen generate

      - name: Build iOS app unsigned
        working-directory: mobile/ios
        run: |
          xcodebuild \
            -project NSControl.xcodeproj \
            -scheme NSControl \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            SYMROOT=build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            build

      - name: Package iOS IPA unsigned
        run: |
          set -euo pipefail

          mkdir -p _artifact Payload
          APP="$(find mobile/ios/build/Release-iphoneos -maxdepth 1 -type d -name '*.app' -print -quit)"

          if [ -z "$APP" ]; then
            echo "Could not find built .app"
            find mobile/ios/build -maxdepth 4 -print | sort
            exit 1
          fi

          rm -rf Payload/NS-mobile.app
          ditto "$APP" Payload/NS-mobile.app

          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName NS-mobile" Payload/NS-mobile.app/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName NS-mobile" Payload/NS-mobile.app/Info.plist 2>/dev/null || true

          ditto -c -k --sequesterRsrc --keepParent Payload _artifact/NS-mobile.ipa

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ns-mobile-ios-ipa
          path: _artifact/NS-mobile.ipa
          if-no-files-found: error

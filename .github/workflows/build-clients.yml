name: Build Clients

on:
  push:
    paths:
      - 'client/**'
      - 'server/include/**'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  actions: write

env:
  SDL_REF: release-3.4.10
  QT_VERSION: '6.8.3'
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/_cache/vcpkg-bincache

jobs:
  build-windows:
    name: Windows static .exe
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: _cache/vcpkg-bincache
          key: vcpkg-windows-static-qtbase-sdl3-${{ env.QT_VERSION }}-${{ env.SDL_REF }}-${{ hashFiles('client/CMakeLists.txt') }}-v1
          restore-keys: |
            vcpkg-windows-static-qtbase-sdl3-${{ env.QT_VERSION }}-${{ env.SDL_REF }}-
            vcpkg-windows-static-qtbase-sdl3-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git _deps/vcpkg
          .\_deps\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Build static Qt + SDL3 with vcpkg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          $env:VCPKG_BINARY_SOURCES = "clear;files,$env:VCPKG_DEFAULT_BINARY_CACHE,readwrite"
          .\_deps\vcpkg\vcpkg.exe install `
            "qtbase[widgets,png,jpeg]:x64-windows-static" `
            "sdl3:x64-windows-static" `
            --clean-after-build

      - name: Make CMake static-Qt friendly
        shell: pwsh
        run: |
          # Static Qt usually auto-imports the default plugins, but this makes the
          # Windows QPA platform plugin explicit when the target exists.
          Add-Content client/CMakeLists.txt @'

          if(WIN32 AND COMMAND qt_import_plugins AND TARGET ns-client AND TARGET Qt6::QWindowsIntegrationPlugin)
            qt_import_plugins(ns-client
              INCLUDE_BY_TYPE platforms Qt6::QWindowsIntegrationPlugin
            )
          endif()
          '@

      - name: Build client
        shell: pwsh
        run: |
          cmake -S client -B client/build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$PWD/_deps/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

          cmake --build client/build --config Release --target ns-client --parallel

      - name: Stage Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force client/artifacts/windows | Out-Null
          Copy-Item client/build/Release/ns-client.exe client/artifacts/windows/ns-client.exe
          Copy-Item client/icon.png client/artifacts/windows/icon.png
          Copy-Item client/icon.ico client/artifacts/windows/icon.ico

      - uses: actions/upload-artifact@v6
        with:
          name: windows-static-exe
          path: client/artifacts/windows/*

  build-linux:
    name: Linux single AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config git file wget desktop-file-utils patchelf \
            qt6-base-dev qt6-base-dev-tools qt6-qpa-plugins \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev libglu1-mesa-dev \
            libx11-dev libxext-dev libxcursor-dev libxi-dev libxfixes-dev libxrandr-dev \
            libxss-dev libxtst-dev libxinerama-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev wayland-protocols libwayland-egl-backend-dev libdecor-0-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev libudev-dev libusb-1.0-0-dev \
            libdbus-1-dev libibus-1.0-dev libdrm-dev libgbm-dev zsync

      - name: Cache SDL3 static
        id: cache-sdl3
        uses: actions/cache@v5
        with:
          path: ~/.local/sdl3-static
          key: sdl3-linux-static-${{ env.SDL_REF }}-v3

      - name: Build SDL3 static
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$SDL_REF" https://github.com/libsdl-org/SDL.git /tmp/SDL3
          cmake -S /tmp/SDL3 -B /tmp/SDL3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/.local/sdl3-static" \
            -DSDL_SHARED=OFF \
            -DSDL_STATIC=ON \
            -DSDL_TEST_LIBRARY=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_EXAMPLES=OFF
          cmake --build /tmp/SDL3-build --parallel
          cmake --install /tmp/SDL3-build

      - name: Build client
        run: |
          cmake -S client -B client/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$HOME/.local/sdl3-static"
          cmake --build client/build --parallel

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp client/build/ns-client AppDir/usr/bin/ns-client
          chmod +x AppDir/usr/bin/ns-client
          cp client/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/ns-client.png
          cp client/icon.png AppDir/.DirIcon
          cp client/icon.png AppDir/usr/bin/icon.png

          cat > AppDir/usr/share/applications/ns-client.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=NS Client
          Exec=ns-client
          Icon=ns-client
          Categories=Game;Utility;
          Terminal=false
          EOF

          cp AppDir/usr/share/applications/ns-client.desktop AppDir/ns-client.desktop
          desktop-file-validate AppDir/usr/share/applications/ns-client.desktop

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          export APPIMAGE_EXTRACT_AND_RUN=1
          export QMAKE=qmake6
          export OUTPUT=ns-client-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

          mkdir -p client/artifacts/linux
          mv ns-client-x86_64.AppImage client/artifacts/linux/

      - uses: actions/upload-artifact@v6
        with:
          name: linux-appimage
          path: client/artifacts/linux/ns-client-x86_64.AppImage

  build-macos:
    name: macOS .app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}

      - name: Install build tools
        run: brew install ninja

      - name: Cache SDL3 static
        id: cache-sdl3
        uses: actions/cache@v5
        with:
          path: ~/.local/sdl3-static
          key: sdl3-macos-static-${{ env.SDL_REF }}-v3

      - name: Build SDL3 static
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$SDL_REF" https://github.com/libsdl-org/SDL.git /tmp/SDL3
          cmake -S /tmp/SDL3 -B /tmp/SDL3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/.local/sdl3-static" \
            -DSDL_SHARED=OFF \
            -DSDL_STATIC=ON \
            -DSDL_TEST_LIBRARY=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_EXAMPLES=OFF
          cmake --build /tmp/SDL3-build --parallel
          cmake --install /tmp/SDL3-build

      - name: Build client
        run: |
          cmake -S client -B client/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$HOME/.local/sdl3-static;$Qt6_DIR"
          cmake --build client/build --parallel

      - name: Create and deploy .app bundle
        run: |
          set -euo pipefail

          APP="client/artifacts/macos/ns-client.app"
          mkdir -p client/artifacts/macos
          rm -rf "$APP"

          echo "Build output tree:"
          find client/build -maxdepth 4 -print | sort

          # Depending on CMakeLists.txt / Qt settings, macOS may produce either:
          #   client/build/ns-client                         plain binary
          #   client/build/ns-client.app/Contents/MacOS/...  app bundle
          # Be robust and support both forms.
          BUILD_APP="$(find client/build -type d -name 'ns-client.app' -print -quit)"
          if [ -n "$BUILD_APP" ]; then
            echo "Found CMake-generated app bundle: $BUILD_APP"
            ditto "$BUILD_APP" "$APP"
          else
            BIN=""
            for candidate in \
              "client/build/ns-client" \
              "client/build/Release/ns-client" \
              "client/build/RelWithDebInfo/ns-client" \
              "client/build/MinSizeRel/ns-client"; do
              if [ -f "$candidate" ]; then
                BIN="$candidate"
                break
              fi
            done

            if [ -z "$BIN" ]; then
              BIN="$(find client/build -type f -name 'ns-client' -print -quit)"
            fi

            if [ -z "$BIN" ]; then
              echo "Could not find ns-client binary or ns-client.app in client/build"
              exit 1
            fi

            echo "Found plain binary: $BIN"
            mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
            cp "$BIN" "$APP/Contents/MacOS/ns-client"
            chmod +x "$APP/Contents/MacOS/ns-client"
          fi

          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          if [ ! -f "$APP/Contents/Info.plist" ]; then
            cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>ns-client</string>
            <key>CFBundleIdentifier</key>
            <string>com.nspccontrol.ns-client</string>
            <key>CFBundleName</key>
            <string>NS Client</string>
            <key>CFBundleDisplayName</key>
            <string>NS Client</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>CFBundleIconFile</key>
            <string>icon</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          else
            /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable ns-client" "$APP/Contents/Info.plist" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :CFBundleExecutable string ns-client" "$APP/Contents/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile icon" "$APP/Contents/Info.plist" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string icon" "$APP/Contents/Info.plist"
          fi

          cp client/icon.png "$APP/Contents/Resources/icon.png"
          cd "$APP/Contents/Resources"
          rm -rf icon.iconset
          mkdir -p icon.iconset
          sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png >/dev/null 2>&1
          sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png >/dev/null 2>&1
          sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png >/dev/null 2>&1
          sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png >/dev/null 2>&1
          sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png >/dev/null 2>&1
          sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png >/dev/null 2>&1
          sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png >/dev/null 2>&1
          sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png >/dev/null 2>&1
          sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png >/dev/null 2>&1
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png >/dev/null 2>&1
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset
          cd - >/dev/null

          macdeployqt "$APP" -verbose=1
          touch "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" client/artifacts/macos/ns-client-macos.app.zip

      - uses: actions/upload-artifact@v6
        with:
          name: macos-app
          path: client/artifacts/macos/ns-client-macos.app.zip

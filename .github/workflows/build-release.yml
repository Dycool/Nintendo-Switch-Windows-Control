name: Build All Binaries and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    uses: ./.github/workflows/build-windows.yml
    
  build-linux:
    uses: ./.github/workflows/build-linux.yml
    
  build-mac:
    uses: ./.github/workflows/build-mac.yml
    
  build-pi-server:
    uses: ./.github/workflows/build-pi.yml

  release:
    needs: [build-windows, build-linux, build-mac, build-pi-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create Release Zips
        run: |
          mkdir -p _zips

          # Windows
          zip -j _zips/ns-pc-control-windows.zip \
            artifacts/windows-gamepad/ns-gamepad.exe \
            artifacts/windows-gui/ns-gui.exe

          # Linux
          zip -j _zips/ns-pc-control-linux.zip \
            artifacts/linux-gamepad/ns-gamepad \
            artifacts/linux-gui/ns-gui

          # macOS CLI + GUI (combined)
          mkdir -p _zips/_mac
          cp artifacts/macos-gamepad/ns-gamepad _zips/_mac/
          unzip -q artifacts/macos-gui/ns-pc-control-mac-gui.zip -d _zips/_mac/
          cd _zips/_mac
          zip -ry ../ns-pc-control-mac.zip ns-gamepad ns-gui.app
          cd ../..
          rm -rf _zips/_mac

          # Pi
          zip -j _zips/ns-pc-control-raspberry-pi.zip \
            artifacts/pi-backend/ns-backend \
            artifacts/pi-setup-gadget/setup_gadget.sh

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            _zips/ns-pc-control-windows.zip
            _zips/ns-pc-control-linux.zip
            _zips/ns-pc-control-mac.zip
            _zips/ns-pc-control-raspberry-pi.zip
          draft: true
          generate_release_notes: true
name: Build All Binaries and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-clients:
    uses: ./.github/workflows/build-clients.yml

  build-server:
    uses: ./.github/workflows/build-server.yml

  release:
    needs: [build-clients, build-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create Release Zips
        run: |
          mkdir -p _zips

          # Windows
          mkdir -p _zips/_windows
          cp -r artifacts/windows/* _zips/_windows/
          cd _zips/_windows
          zip -r ../ns-pc-control-windows.zip .
          cd ../..
          rm -rf _zips/_windows

          # Linux
          mkdir -p _zips/_linux
          cp -r artifacts/linux/* _zips/_linux/
          cd _zips/_linux
          zip -r ../ns-pc-control-linux.zip .
          cd ../..
          rm -rf _zips/_linux

          # macOS
          mkdir -p _zips/_mac
          cp -R artifacts/macos/ns-client.app _zips/_mac/
          cd _zips/_mac
          zip -ry ../ns-pc-control-mac.zip ns-client.app
          cd ../..
          rm -rf _zips/_mac

          # Raspberry Pi unified server
          mkdir -p _zips/_pi
          cp artifacts/pi-server/ns-backend _zips/_pi/ns-backend
          cd _zips/_pi
          zip -r ../ns-pc-control-raspberry-pi.zip ns-backend
          cd ../..
          rm -rf _zips/_pi

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            _zips/ns-pc-control-windows.zip
            _zips/ns-pc-control-linux.zip
            _zips/ns-pc-control-mac.zip
            _zips/ns-pc-control-raspberry-pi.zip
          draft: true
          generate_release_notes: true

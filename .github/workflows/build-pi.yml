name: Build Pi Backend

on:
  push:
    paths:
      - 'server/rpi/**'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-pi-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install ARM Cross-Compiler and deps
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-aarch64-linux-gnu cmake zip wget

      - name: Cross-compile miniupnpc for aarch64
        run: |
          wget -q https://github.com/miniupnp/miniupnp/archive/refs/tags/miniupnpc_2_2_8.tar.gz
          tar xzf miniupnpc_2_2_8.tar.gz
          cd miniupnp-miniupnpc_2_2_8/miniupnpc
          mkdir build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_INSTALL_PREFIX=/tmp/miniupnpc \
            -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          make install

      - name: Build Hori Server
        run: |
          cd server/rpi
          mkdir -p build-hori && cd build-hori
          cmake .. \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DMINIUPNPC_INCLUDE_DIRS=/tmp/miniupnpc/include \
            -DMINIUPNPC_LIBRARIES=/tmp/miniupnpc/lib/libminiupnpc.a \
            -DBACKEND_SOURCE=src/backend/hori-main.cpp
          make -j$(nproc)
          cp ../setup_gadget.sh .
          mkdir hori-server
          cp ns-backend setup_gadget.sh hori-server/
          cd hori-server && zip -r ../hori-server.zip .

      - name: Build Pro Server
        run: |
          cd server/rpi
          mkdir -p build-pro && cd build-pro
          cmake .. \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DMINIUPNPC_INCLUDE_DIRS=/tmp/miniupnpc/include \
            -DMINIUPNPC_LIBRARIES=/tmp/miniupnpc/lib/libminiupnpc.a \
            -DBACKEND_SOURCE=src/backend/pro-main.cpp
          make -j$(nproc)
          cp ../setup_gadget.sh .
          mkdir pro-server
          cp ns-backend setup_gadget.sh pro-server/
          cd pro-server && zip -r ../pro-server.zip .

      - uses: actions/upload-artifact@v6
        with:
          name: hori-server
          path: server/rpi/build-hori/hori-server.zip

      - uses: actions/upload-artifact@v6
        with:
          name: pro-server
          path: server/rpi/build-pro/pro-server.zip
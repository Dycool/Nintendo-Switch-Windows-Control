name: Build Pi Backend

on:
  push:
    paths:
      - 'server/rpi/**'
  workflow_dispatch:
  workflow_call:

jobs:
  build-pi-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ARM Cross-Compiler and zip
        run: sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu cmake zip
        
      - name: Build Pi Server
        run: |
          cd server/rpi
          mkdir build && cd build
          cmake .. -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
          make
          cp ../setup_gadget.sh .
          zip ns-pc-control-raspberry-pi.zip ns-server setup_gadget.sh
          
      - uses: actions/upload-artifact@v4
        with:
          name: rpi-artifact
          path: server/rpi/build/ns-pc-control-raspberry-pi.zip
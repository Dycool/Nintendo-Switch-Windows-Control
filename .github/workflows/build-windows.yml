name: Build Windows

permissions:
  contents: read

on:
  push:
    paths:
      - 'client/windows/**'
  workflow_dispatch:
  workflow_call:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Terminal Client (MinGW)
        shell: bash
        run: |
          cd client/windows/
          g++ -std=c++17 -O2 -Wall ns-gamepad.cpp -o ns-gamepad.exe -static -lws2_32 -lxinput -lwinmm

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Build GUI Client (MSVC)
        shell: pwsh
        run: |
          cd client/windows
          rc /nologo ns-gui.rc
          cl /std:c++17 /O2 /EHsc /W3 ns-gui.cpp ns-gui.res /link ws2_32.lib xinput.lib setupapi.lib comctl32.lib user32.lib kernel32.lib gdi32.lib advapi32.lib winmm.lib /out:ns-gui.exe

      - uses: actions/upload-artifact@v6
        with:
          name: windows-gamepad
          path: client/windows/ns-gamepad.exe

      - uses: actions/upload-artifact@v6
        with:
          name: windows-gui
          path: client/windows/ns-gui.exe

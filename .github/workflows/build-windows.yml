name: Build Windows

permissions:
  contents: read

on:
  push:
    paths:
      - 'client/windows/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:
  workflow_call:

env:
  SDL_REF: release-3.4.10
  SDL_CACHE_VERSION: v1

  # Pin this later to a commit SHA for reproducible builds.
  JSL_REF: master
  JSL_CACHE_VERSION: v2

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Restore SDL3 static cache
        id: cache-sdl3
        uses: actions/cache@v5
        with:
          path: _cache/sdl3-static
          key: sdl3-${{ runner.os }}-x64-${{ env.SDL_REF }}-mt-${{ env.SDL_CACHE_VERSION }}
          restore-keys: |
            sdl3-${{ runner.os }}-x64-${{ env.SDL_REF }}-mt-

      - name: Build and install SDL3 static
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:SDL_REF https://github.com/libsdl-org/SDL.git _deps/SDL

          cmake -S _deps/SDL -B _deps/SDL/build-static -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$PWD/_cache/sdl3-static" `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DSDL_SHARED=OFF `
            -DSDL_STATIC=ON `
            -DSDL_TESTS=OFF `
            -DSDL_TEST_LIBRARY=OFF `
            -DSDL_EXAMPLES=OFF

          cmake --build _deps/SDL/build-static --config Release --target install --parallel

      - name: Restore JoyShockLibrary static cache
        id: cache-jsl
        uses: actions/cache@v5
        with:
          path: _cache/jsl-static
          key: jsl-${{ runner.os }}-x64-${{ env.JSL_REF }}-mt-${{ env.JSL_CACHE_VERSION }}
          restore-keys: |
            jsl-${{ runner.os }}-x64-${{ env.JSL_REF }}-mt-

      - name: Build and install JoyShockLibrary static
        if: steps.cache-jsl.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:JSL_REF https://github.com/JibbSmart/JoyShockLibrary.git _deps/JoyShockLibrary

          cmake -S _deps/JoyShockLibrary -B _deps/JoyShockLibrary/build-static -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$PWD/_cache/jsl-static" `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF

          cmake --build _deps/JoyShockLibrary/build-static --config Release --parallel

          New-Item -ItemType Directory -Force _cache/jsl-static/include | Out-Null
          New-Item -ItemType Directory -Force _cache/jsl-static/lib | Out-Null

          Copy-Item _deps/JoyShockLibrary/JoyShockLibrary/JoyShockLibrary.h _cache/jsl-static/include/

          $jsl = Get-ChildItem _deps/JoyShockLibrary/build-static -Recurse -Filter JoyShockLibrary.lib |
            Where-Object { $_.FullName -match "\\Release\\" } |
            Select-Object -First 1

          if (-not $jsl) {
            $jsl = Get-ChildItem _deps/JoyShockLibrary/build-static -Recurse -Filter JoyShockLibrary.lib |
              Select-Object -First 1
          }

          if (-not $jsl) {
            throw "JoyShockLibrary.lib not found"
          }

          Copy-Item $jsl.FullName _cache/jsl-static/lib/JoyShockLibrary.lib

          $hidapi = Get-ChildItem _deps/JoyShockLibrary/build-static -Recurse -Filter hidapi.lib |
            Where-Object { $_.FullName -match "\\Release\\" } |
            Select-Object -First 1

          if (-not $hidapi) {
            $hidapi = Get-ChildItem _deps/JoyShockLibrary/build-static -Recurse -Filter hidapi.lib |
              Select-Object -First 1
          }

          if (-not $hidapi) {
            throw "hidapi.lib not found"
          }

          Copy-Item $hidapi.FullName _cache/jsl-static/lib/hidapi.lib

      - name: Build Windows Clients (MSVC + cached static SDL3 + static JoyShockLibrary)
        shell: pwsh
        run: |
          cd client/windows

          @'
          cmake_minimum_required(VERSION 3.20)
          project(ns_windows_clients_sdl3 LANGUAGES C CXX RC)

          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)

          if(MSVC)
            set(CMAKE_MSVC_RUNTIME_LIBRARY "MultiThreaded$<$<CONFIG:Debug>:Debug>")
          endif()

          find_package(SDL3 REQUIRED CONFIG
            PATHS "${CMAKE_CURRENT_LIST_DIR}/../../_cache/sdl3-static"
            NO_DEFAULT_PATH
          )

          set(JSL_ROOT "${CMAKE_CURRENT_LIST_DIR}/../../_cache/jsl-static")
          set(JSL_INCLUDE_DIR "${JSL_ROOT}/include")
          set(JSL_LIBRARY "${JSL_ROOT}/lib/JoyShockLibrary.lib")
          set(HIDAPI_LIBRARY "${JSL_ROOT}/lib/hidapi.lib")

          if(NOT EXISTS "${JSL_INCLUDE_DIR}/JoyShockLibrary.h")
            message(FATAL_ERROR "JoyShockLibrary.h not found at ${JSL_INCLUDE_DIR}")
          endif()

          if(NOT EXISTS "${JSL_LIBRARY}")
            message(FATAL_ERROR "JoyShockLibrary.lib not found at ${JSL_LIBRARY}")
          endif()

          if(NOT EXISTS "${HIDAPI_LIBRARY}")
            message(FATAL_ERROR "hidapi.lib not found at ${HIDAPI_LIBRARY}")
          endif()

          add_library(JoyShockLibraryStatic STATIC IMPORTED)
          set_target_properties(JoyShockLibraryStatic PROPERTIES
            IMPORTED_LOCATION "${JSL_LIBRARY}"
            INTERFACE_INCLUDE_DIRECTORIES "${JSL_INCLUDE_DIR}"
          )

          add_library(HIDAPIStatic STATIC IMPORTED)
          set_target_properties(HIDAPIStatic PROPERTIES
            IMPORTED_LOCATION "${HIDAPI_LIBRARY}"
          )

          add_executable(ns-gamepad
            ns-gamepad.cpp
          )

          add_executable(ns-gui WIN32
            ns-gui.cpp
            ns-gui.rc
          )

          foreach(target IN ITEMS ns-gamepad ns-gui)
            target_compile_definitions(${target} PRIVATE
              UNICODE
              _UNICODE
              WIN32_LEAN_AND_MEAN
              NOMINMAX
              _CRT_SECURE_NO_WARNINGS
              SDL_MAIN_HANDLED
              NS_SDL3_STATIC
              NS_LINK_SDL3_MANUALLY
            )

            if(MSVC)
              target_compile_options(${target} PRIVATE /W3 /O2 /EHsc)
            endif()

            target_link_libraries(${target} PRIVATE
              SDL3::SDL3
              ws2_32
              comctl32
              comdlg32
              winmm
              user32
              kernel32
              gdi32
              advapi32
              shell32
              ole32
              oleaut32
              uuid
              version
              setupapi
              imm32
            )

            set_target_properties(${target} PROPERTIES
              RUNTIME_OUTPUT_DIRECTORY "${CMAKE_CURRENT_LIST_DIR}"
              RUNTIME_OUTPUT_DIRECTORY_RELEASE "${CMAKE_CURRENT_LIST_DIR}"
              RUNTIME_OUTPUT_DIRECTORY_RELWITHDEBINFO "${CMAKE_CURRENT_LIST_DIR}"
              RUNTIME_OUTPUT_DIRECTORY_MINSIZEREL "${CMAKE_CURRENT_LIST_DIR}"
            )
          endforeach()

          target_compile_definitions(ns-gui PRIVATE
            NS_ENABLE_JOYSHOCK
            NS_JSL_STATIC
          )

          target_link_libraries(ns-gui PRIVATE
            JoyShockLibraryStatic
            HIDAPIStatic
            hid
            setupapi
          )
          '@ | Set-Content -Encoding UTF8 CMakeLists.txt

          cmake -S . -B build-sdl3 -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

          cmake --build build-sdl3 --config Release --target ns-gamepad --parallel
          cmake --build build-sdl3 --config Release --target ns-gui --parallel

          if (Test-Path ".\SDL3.dll") {
            throw "SDL3.dll was produced next to the clients; expected statically-linked exes."
          }

          if (Test-Path ".\JoyShockLibrary.dll") {
            throw "JoyShockLibrary.dll was produced next to the clients; expected statically-linked exe."
          }

      - uses: actions/upload-artifact@v6
        with:
          name: windows-gamepad
          path: client/windows/ns-gamepad.exe

      - uses: actions/upload-artifact@v6
        with:
          name: windows-gui
          path: client/windows/ns-gui.exe
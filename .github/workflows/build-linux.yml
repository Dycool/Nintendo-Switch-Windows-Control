name: Build Linux

on:
  push:
    paths:
      - 'client/linux/**'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Build Terminal Client
        run: |
          cd client/linux/
          g++ -O3 -pthread ns-gamepad.cpp -o ns-gamepad -lSDL2

      - name: Build GUI Client (Dear ImGui)
        run: |
          cd client/linux/
          IMGUI_VER="1.91.0"
          curl -sL "https://github.com/ocornut/imgui/archive/refs/tags/v${IMGUI_VER}.zip" -o /tmp/imgui.zip
          unzip -q -o /tmp/imgui.zip -d /tmp/
          ISRC="/tmp/imgui-${IMGUI_VER}"
          g++ -O3 -std=c++17 ns-gui.cpp \
            "${ISRC}/imgui.cpp" \
            "${ISRC}/imgui_draw.cpp" \
            "${ISRC}/imgui_tables.cpp" \
            "${ISRC}/imgui_widgets.cpp" \
            "${ISRC}/backends/imgui_impl_sdl2.cpp" \
            "${ISRC}/backends/imgui_impl_sdlrenderer2.cpp" \
            -I"${ISRC}" -I"${ISRC}/backends" \
            -o ns-gui -lpthread -lSDL2

      - uses: actions/upload-artifact@v6
        with:
          name: linux-gamepad
          path: client/linux/ns-gamepad

      - uses: actions/upload-artifact@v6
        with:
          name: linux-gui
          path: client/linux/ns-gui

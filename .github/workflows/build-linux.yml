name: Build Linux

on:
  push:
    paths:
      - 'client/linux/**'
      - '.github/workflows/build-linux.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config libgtk-3-dev

      - name: Cache SDL3
        id: cache-sdl3
        uses: actions/cache@v4
        with:
          path: ~/.local/sdl3
          key: ${{ runner.os }}-sdl3-release-3.2.x

      - name: Build SDL3
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch release-3.2.x https://github.com/libsdl-org/SDL.git /tmp/SDL3
          cmake -S /tmp/SDL3 -B /tmp/SDL3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/.local/sdl3" \
            -DSDL_TEST_LIBRARY=OFF
          cmake --build /tmp/SDL3-build
          cmake --install /tmp/SDL3-build

      - name: Build Terminal Client
        run: |
          export PKG_CONFIG_PATH="$HOME/.local/sdl3/lib/pkgconfig:$PKG_CONFIG_PATH"
          cd client/linux/
          g++ -O3 -std=c++17 ns-gamepad.cpp -o ns-gamepad \
            $(pkg-config --cflags --libs sdl3) -lpthread

      - name: Build GUI Client (GTK3)
        run: |
          export PKG_CONFIG_PATH="$HOME/.local/sdl3/lib/pkgconfig:$PKG_CONFIG_PATH"
          cd client/linux/
          g++ -O3 -std=c++17 ns-gui.cpp -o ns-gui \
            $(pkg-config --cflags --libs gtk+-3.0 sdl3) -lpthread

      - uses: actions/upload-artifact@v6
        with:
          name: linux-gamepad
          path: client/linux/ns-gamepad

      - uses: actions/upload-artifact@v6
        with:
          name: linux-gui
          path: client/linux/ns-gui

name: Build Linux

on:
  push:
    paths:
      - 'client/linux/**'
  workflow_dispatch:
  workflow_call:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install GTK3
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Build Terminal Client
        run: |
          cd client/linux/
          g++ -O3 -pthread ns-gamepad.cpp -o ns-gamepad

      - name: Build GUI Client
        run: |
          cd client/linux/
          g++ -std=c++17 -O2 -Wall ns-gui.cpp -o ns-gui $(pkg-config --cflags --libs gtk+-3.0) -lpthread

      - name: Package
        run: |
          cd client/linux/
           zip ns-pc-control-linux.zip ns-gamepad ns-gui

      - uses: actions/upload-artifact@v6
        with:
          name: linux-artifact
          path: client/linux/ns-pc-control-linux.zip

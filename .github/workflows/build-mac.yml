name: Build macOS

on:
  push:
    paths:
      - 'client/mac/**'
  workflow_dispatch:
  workflow_call:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build macOS
        run: |
          cd client/mac/
          clang++ -std=c++17 -ObjC++ -framework GameController -framework Foundation ns-gamepad.mm -o ns-gamepad
          zip ns-pc-control-mac.zip ns-gamepad
          
      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: client/mac/ns-pc-control-mac.zip
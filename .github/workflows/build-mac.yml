name: Build macOS

on:
  push:
    paths:
      - 'client/mac/**'
  workflow_dispatch:
  workflow_call:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Terminal Client
        run: |
          cd client/mac/
          clang++ -std=c++17 -ObjC++ -framework GameController -framework Foundation ns-gamepad.mm -o ns-gamepad

      - name: Build GUI App Bundle
        run: |
          cd client/mac/
          bash build_gui.sh

      - name: Package
        run: |
          cd client/mac/
          zip -r ns-pc-control-mac.zip ns-gamepad ns-gui.app

      - uses: actions/upload-artifact@v6
        with:
          name: macos-artifact
          path: client/mac/ns-pc-control-mac.zip

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        html, body { background: #111; color: #fff; margin:0; padding:0; width: 100%; height: 100%; overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none; font-family:sans-serif; }
        #gamepad { position: fixed; top: env(safe-area-inset-top, 0px); right: env(safe-area-inset-right, 0px); bottom: env(safe-area-inset-bottom, 0px); left: env(safe-area-inset-left, 0px); box-sizing: border-box; }
        #rotate-msg { display:none; position:absolute; inset:0; background:#000; z-index:9999; justify-content:center; align-items:center; text-align:center; padding:20px; font-size:18px; }
        @media (orientation: portrait) { #rotate-msg { display:flex; } #gamepad { display:none; } }
        
        .edit-item { position: absolute; box-sizing: border-box; }
        .btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); display:flex; justify-content:center; align-items:center; font-weight:bold; color:#ddd; font-size:16px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .btn, .joystick, .cross { touch-action:none; -webkit-tap-highlight-color: transparent; -webkit-touch-callout:none; }
        .btn.active { background: rgba(255,255,255,0.7); color: #000; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .btn-circle { border-radius: 50%; width: 100%; height: 100%; }
        .btn-shoulder { border-radius: 8px; font-size:14px; }
        .btn-sys { border-radius: 50%; font-size: 14px; }
        
        .cross { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 4px; }
        .cross .up { grid-column: 2; grid-row: 1; }
        .cross .down { grid-column: 2; grid-row: 3; }
        .cross .left { grid-column: 1; grid-row: 2; }
        .cross .right { grid-column: 3; grid-row: 2; }
        .joystick { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 50%; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); aspect-ratio: 1/1; }
        .knob { width: 40%; height: 40%; background: rgba(255,255,255,0.3); border-radius: 50%; position: absolute; top: 30%; left: 30%; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
    </style>
<script>
(function(){
if (window.__androidBridgeLoaded) return;
window.__androidBridgeLoaded = true;
if (!window.NSBridge) return;
window.__bridge = window.__bridge || {};
if (typeof NSBridge.onBinary === 'function') {
    window.__bridge.send = function(data) {
        if (data instanceof ArrayBuffer) {
            var u8 = new Uint8Array(data);
            var arr = [];
            for (var i = 0; i < u8.length; i++) arr.push(u8[i]);
            NSBridge.onBinary(JSON.stringify(arr));
        }
    };
}
window.WebSocket = function(url, protocols) {
    this.readyState = 0;
    this.binaryType = 'arraybuffer';
    this.onopen = null; this.onclose = null; this.onerror = null; this.onmessage = null;
    this.send = function(data) { window.__bridge.send(data); };
    this.close = function() { if (NSBridge.onClose) NSBridge.onClose(); else if (window.__bridge && window.__bridge.close) window.__bridge.close(); };
    if (window.__bridge.connect) window.__bridge.connect(url);
    setTimeout(function() {
        this.readyState = 1;
        if (NSBridge.onOpen) NSBridge.onOpen();
        if (this.onopen) this.onopen();
    }.bind(this), 0);
};
window.WebSocket.CONNECTING = 0;
window.WebSocket.OPEN = 1;
window.WebSocket.CLOSING = 2;
window.WebSocket.CLOSED = 3;
})();
</script>
</head>
<body>
    <style>
        .overlap { border: 2px solid red !important; box-shadow: 0 0 15px red !important; z-index: 1000; }
        #editor-bar {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); border-radius: 12px; display: flex; flex-direction: column;
            z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #444; width: 300px;
            max-height: 90vh; overflow-y: auto;
        }
        #editor-bar button, #editor-bar select { padding: 10px; font-size: 16px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        #toggleDel { background: #555; color: white; transition: 0.2s; }
        #toggleDel.active { background: #e33; }
    </style>
    <div id="rotate-msg">Please rotate to landscape mode.</div>
    <div id="gamepad">
        <div id="menu-toggle" onclick="toggleMenu()" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:50px; height:50px; background:rgba(255,255,255,0.2); border-radius:50%; display:none; justify-content:center; align-items:center; z-index:9999; font-size:24px; box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.5);">⚙️</div>
        <div id="editor-bar">
            <div id="eb-header" style="padding: 10px; background: #333; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; cursor: move;">
                <span style="font-weight:bold; font-size:14px; color: white;">Editor Settings</span>
                <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:22px; padding:10px; margin-right:-5px; cursor:pointer; line-height:1;">❌</button>
            </div>
            <div style="padding: 15px; display: flex; flex-direction: column; gap: 10px;">
                <div style="color:#fff; text-align:center; font-size:14px; margin-bottom:5px;">Drag to Move, Pinch to Resize</div>
                <button onclick="saveLayout()" style="background:#0a0; color:#fff;">Save</button>
                <select id="addSel" onchange="addBtn()"><option value="">+ Add Button</option></select>
                <button id="toggleDel" onclick="toggleDel()">🗑️ Delete Mode: OFF</button>
                <button onclick="window.location.href='mobile.html'" style="background:#a00; color:#fff;">Cancel</button>
                <button onclick="resetLayout()" style="background:#e91e63; color:#fff;">Reset to Defaults</button>
            </div>
        </div>
        <div id="btn-zl" class="edit-item btn-shoulder btn">ZL</div>
        <div id="btn-l" class="edit-item btn-shoulder btn">L</div>
        <div id="btn-zr" class="edit-item btn-shoulder btn">ZR</div>
        <div id="btn-r" class="edit-item btn-shoulder btn">R</div>
        <div id="btn-minus" class="edit-item btn-sys btn">-</div>
        <div id="btn-plus" class="edit-item btn-sys btn">+</div>
        <div id="btn-capture" class="edit-item btn-sys btn">O</div>
        <div id="btn-home" class="edit-item btn-sys btn">⌂</div>
        <div id="lstick" class="edit-item joystick"><div class="knob"></div></div>
        <div id="btn-ls" class="edit-item btn-sys btn">LS</div>
        <div id="dpad" class="edit-item cross">
            <div class="btn btn-circle up">&#x25B2;&#xFE0E;</div><div class="btn btn-circle left">&#x25C0;&#xFE0E;</div>
            <div class="btn btn-circle right">&#x25B6;&#xFE0E;</div><div class="btn btn-circle down">&#x25BC;&#xFE0E;</div>
        </div>
        <div id="abxy" class="edit-item cross">
            <div class="btn btn-circle up">X</div><div class="btn btn-circle left">Y</div>
            <div class="btn btn-circle right">A</div><div class="btn btn-circle down">B</div>
        </div>
        <div id="rstick" class="edit-item joystick"><div class="knob"></div></div>
        <div id="btn-rs" class="edit-item btn-sys btn">RS</div>
    </div>
<script>
const defLayout = {
    'btn-zl': {l:4, t:4, w:14, h:8}, 'btn-l': {l:4, t:14, w:14, h:8},
    'btn-zr': {l:82, t:4, w:14, h:8}, 'btn-r': {l:82, t:14, w:14, h:8},
    'btn-minus': {l:38, t:5, w:6}, 'btn-plus': {l:56, t:5, w:6},
    'btn-capture': {l:42, t:18, w:5}, 'btn-home': {l:53, t:18, w:5},
    'lstick': {l:6, t:35, w:16}, 'btn-ls': {l:2, t:65, w:5},
    'dpad': {l:22, t:60, w:16},
    'abxy': {l:78, t:35, w:16},
    'rstick': {l:62, t:60, w:16}, 'btn-rs': {l:85, t:80, w:5}
};
let layout = JSON.parse(localStorage.getItem('nswc_layout')) || defLayout;
function applyLayout() {
    for(let id in defLayout) {
        let el = document.getElementById(id);
        if(!el) continue;
        let conf = layout[id] || defLayout[id];
        if(conf.hide) { el.style.display = 'none'; }
        else {
            if(id === 'dpad' || id === 'abxy') el.style.display = 'grid';
            else el.style.display = 'flex';
            el.style.left = conf.l + '%'; el.style.top = conf.t + '%'; el.style.width = conf.w + '%';
            if(conf.h) el.style.height = conf.h + '%';
            else { el.style.aspectRatio = '1 / 1'; el.style.height = 'auto'; }
        }
    }
}
applyLayout();
function populateAdd() {
    let sel = document.getElementById('addSel'); sel.innerHTML = '<option value="">+ Add Button</option>';
    for(let id in defLayout) {
        let conf = layout[id] || defLayout[id];
        if(conf.hide) { let opt = document.createElement('option'); opt.value = id; opt.innerText = id; sel.appendChild(opt); }
    }
}
populateAdd();
function addBtn() {
    let val = document.getElementById('addSel').value;
    if(!val) return;
    if(!layout[val]) layout[val] = {...defLayout[val]};
    layout[val].hide = false; layout[val].l = 45; layout[val].t = 15;
    applyLayout(); populateAdd(); checkOverlaps();
}
function checkOverlaps() {
    let els = Array.from(document.querySelectorAll('.edit-item')).filter(e => e.style.display !== 'none');
    els.forEach(e => e.classList.remove('overlap'));
    let hasOverlap = false;
    for(let i=0; i<els.length; i++) {
        for(let j=i+1; j<els.length; j++) {
            let b1 = els[i].getBoundingClientRect(), b2 = els[j].getBoundingClientRect();
            let s1x = b1.width * 0.1, s1y = b1.height * 0.1;
            let s2x = b2.width * 0.1, s2y = b2.height * 0.1;
            if (!(b1.right - s1x < b2.left + s2x || b1.left + s1x > b2.right - s2x || b1.bottom - s1y < b2.top + s2y || b1.top + s1y > b2.bottom - s2y)) {
                els[i].classList.add('overlap'); els[j].classList.add('overlap'); hasOverlap = true;
            }
        }
    }
    return hasOverlap;
}
function toggleMenu() {
    let eb = document.getElementById('editor-bar'); let tg = document.getElementById('menu-toggle');
    if(eb.style.display === 'none') { eb.style.display = 'flex'; tg.style.display = 'none'; }
    else { eb.style.display = 'none'; tg.style.display = 'flex'; }
}
let eb = document.getElementById('editor-bar');
let isDraggingMenu = false, menuDx, menuDy;
eb.addEventListener('touchstart', e => {
    if (e.target.closest('button, select, input')) return;
    isDraggingMenu = true; let rect = eb.getBoundingClientRect();
    menuDx = e.touches[0].clientX - (rect.left + rect.width/2);
    menuDy = e.touches[0].clientY - (rect.top + rect.height/2);
    e.stopPropagation();
}, {passive:false});
window.addEventListener('touchmove', e => {
    if(isDraggingMenu) {
        e.preventDefault();
        eb.style.left = (e.touches[0].clientX - menuDx) + 'px';
        eb.style.top = (e.touches[0].clientY - menuDy) + 'px';
    }
}, {passive:false});
window.addEventListener('touchend', e => { isDraggingMenu = false; });
let activeEl = null, mode = 'none', startX, startY, startL, startT, initialDist, startW, startH, deleteMode = false;
function toggleDel() {
    deleteMode = !deleteMode; const btn = document.getElementById('toggleDel');
    if(deleteMode) { btn.classList.add('active'); btn.innerText = "🗑️ Delete Mode: ON"; }
    else { btn.classList.remove('active'); btn.innerText = "🗑️ Delete Mode: OFF"; }
}
function getDist(t1, t2) { return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY); }
document.getElementById('gamepad').addEventListener('touchstart', e => {
    if(e.target.closest('#editor-bar') || e.target.closest('#menu-toggle')) return;
    let el = e.target.closest('.edit-item'); if(!el) return;
    e.preventDefault();
    if (deleteMode) {
        if(!layout[el.id]) layout[el.id] = {...defLayout[el.id]};
        layout[el.id].hide = true; applyLayout(); populateAdd(); checkOverlaps(); return;
    }
    activeEl = el; if(!layout[el.id]) layout[el.id] = {...defLayout[el.id]};
    if(e.touches.length === 1) {
        mode = 'drag'; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        startL = layout[el.id].l; startT = layout[el.id].t;
    } else if(e.touches.length === 2) {
        mode = 'pinch'; initialDist = getDist(e.touches[0], e.touches[1]);
        startW = layout[el.id].w; startH = layout[el.id].h;
    }
}, {passive:false});
document.getElementById('gamepad').addEventListener('touchmove', e => {
    if(!activeEl || deleteMode) return; e.preventDefault();
    let pw = window.innerWidth, ph = window.innerHeight, conf = layout[activeEl.id];
    if(mode === 'drag' && e.touches.length === 1) {
        let dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
        conf.l = startL + (dx / pw * 100); conf.t = startT + (dy / ph * 100);
    } else if(mode === 'pinch' && e.touches.length >= 2) {
        let scale = getDist(e.touches[0], e.touches[1]) / initialDist;
        conf.w = Math.max(2, startW * scale); if(startH) conf.h = Math.max(2, startH * scale);
    }
    applyLayout(); checkOverlaps();
}, {passive:false});
document.getElementById('gamepad').addEventListener('touchend', e => {
    if(e.touches.length === 0) { activeEl = null; mode = 'none'; }
    else if(e.touches.length === 1 && activeEl) {
        mode = 'drag'; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        startL = layout[activeEl.id].l; startT = layout[activeEl.id].t;
    }
});
setTimeout(checkOverlaps, 500);
function saveLayout() {
    if(checkOverlaps()) { alert('Fix overlapping buttons (red) before saving!'); return; }
    localStorage.setItem('nswc_layout', JSON.stringify(layout));
    window.location.href = 'mobile.html';
}
function resetLayout() {
    if(confirm('Are you sure you want to reset all buttons to their default positions and sizes?')) {
        layout = JSON.parse(JSON.stringify(defLayout));
        applyLayout();
        populateAdd();
        checkOverlaps();
    }
}
</script>
</body>
</html>
